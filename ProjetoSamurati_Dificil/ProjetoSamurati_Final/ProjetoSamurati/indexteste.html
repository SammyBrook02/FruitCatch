<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fruit Catcher</title>
<link rel="icon" type="image/x-icon" href="IMG/tree.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

:root {
  --green: #3aa657;
  --green-dark: #2a7a3f;
  --bg: #02362f;
  --gold: #f5c842;
  --red: #e63946;
  --blue: #4cc9f0;
}

html, body {
  width:100%; height:100%;
  background: var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family: 'Press Start 2P', cursive;
  touch-action: none;
}

#gameContainer {
  position: relative;
  width: 420px;
  height: 650px;
  user-select: none;
}

canvas {
  border: 3px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  background: black;
  position: absolute;
  top: 0; left: 0;
  box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 60px rgba(0,0,0,0.3);
}

/* ── MENU ── */
#menu {
  position: absolute;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
  z-index: 10;
  gap: 12px;
  padding: 20px;
}

#menu h1 {
  font-size: 30px;
  line-height: 1.4;
  text-shadow: 0 0 20px rgba(58,166,87,0.8), 3px 3px 0 #1a5c30;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

#playerName {
  padding: 10px 14px;
  border-radius: 8px;
  border: 2px solid var(--green);
  font-size: 11px;
  font-family: 'Press Start 2P', cursive;
  background: rgba(0,0,0,0.5);
  color: white;
  text-align: center;
  width: 220px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#playerName:focus {
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(245,200,66,0.4);
}
#playerName::placeholder { color: rgba(255,255,255,0.35); font-size:9px; }

.menu-btn {
  padding: 12px 28px;
  font-size: 13px;
  cursor: pointer;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, var(--green), var(--green-dark));
  color: white;
  font-family: 'Press Start 2P', cursive;
  transition: transform 0.1s, box-shadow 0.1s;
  box-shadow: 0 4px 0 #1a5c30;
  letter-spacing: 1px;
}
.menu-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #1a5c30; }
.menu-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1a5c30; }

#ranking {
  margin-top: 4px;
  width: 100%;
  max-width: 320px;
}
#ranking h3 {
  font-size: 10px;
  color: var(--gold);
  margin-bottom: 8px;
  text-shadow: 0 0 8px rgba(245,200,66,0.6);
}
#ranking .rank-row {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  padding: 4px 8px;
  background: rgba(255,255,255,0.07);
  border-radius: 4px;
  margin-bottom: 3px;
}
#ranking .rank-row.top1 { background: rgba(245,200,66,0.2); color: var(--gold); }
#ranking .rank-row.top2 { color: #ccc; }
#ranking .rank-row.top3 { color: #cd7f32; }

/* ── CORNER BUTTONS ── */
#cornerBtns {
  position: absolute;
  top: 10px; right: 10px;
  z-index: 20;
  display: flex;
  gap: 8px;
}

#muteBtn, #pauseBtn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  border: 2px solid rgba(255,255,255,0.4);
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.1s;
}
#muteBtn:hover, #pauseBtn:hover { background: rgba(0,0,0,0.8); transform: scale(1.1); }

/* ── TOUCH CONTROLS ── */
#touchControls {
  position: absolute;
  bottom: 10px;
  left: 0; right: 0;
  display: none;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 15;
}
#touchLeft, #touchRight {
  width: 80px; height: 60px;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 12px;
  color: white;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
#touchLeft:active, #touchRight:active { background: rgba(255,255,255,0.35); }

/* Show touch controls on touch devices */
@media (pointer: coarse) {
  #touchControls { display: flex; }
}

/* ── COMBO POPUP ── */
#comboDisplay {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;
  color: var(--gold);
  font-size: 20px;
  text-shadow: 0 0 10px rgba(245,200,66,0.8), 2px 2px 0 #000;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}

/* ── PAUSE BTN visibility ── */
#pauseBtn { display: none; }
#pauseBtn.visible { display: flex; }

/* ── SLOW INDICATOR ── */
#slowIndicator {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 15;
  color: var(--blue);
  font-size: 8px;
  text-shadow: 0 0 8px var(--blue);
  display: none;
  animation: blink 0.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>

<body>
<div id="gameContainer">

  <div id="cornerBtns">
    <button id="pauseBtn" title="Pausar/Retomar">⏸</button>
    <button id="muteBtn" title="Mutar/Desmutar">🔊</button>
  </div>

  <div id="menu">
    <h1>🍎 Fruit<br>Catcher</h1>
    <input id="playerName" placeholder="Digite seu nome" maxlength="16" autocomplete="off">
    <button class="menu-btn" id="playBtn">▶ JOGAR</button>
    <div id="ranking"></div>
  </div>

  <canvas id="game" width="420" height="650"></canvas>

  <div id="touchControls">
    <div id="touchLeft">◀</div>
    <div id="touchRight">▶</div>
  </div>

  <div id="comboDisplay"></div>
  <div id="slowIndicator">❄ LENTO ❄</div>

</div>

<script>
/* =============================================
   ÁUDIO
   ============================================= */
const sounds = {
  menu:    new Audio("SONGS/menu.mp3"),
  fruta:   new Audio("SONGS/fruta.mp3"),
  bomba:   new Audio("SONGS/bomba.mp3"),
  vitoria: new Audio("SONGS/vitoria.mp3"),
  derrota: new Audio("SONGS/derrota.mp3"),
};
sounds.menu.loop = true;
sounds.menu.volume = 0.4;
sounds.fruta.volume = 0.7;
sounds.bomba.volume = 0.8;
sounds.vitoria.volume = 0.7;
sounds.derrota.volume = 0.7;

let muted = false;
let currentBGMusic = null;

function playBG(name) {
  if (currentBGMusic && !currentBGMusic.paused) {
    currentBGMusic.pause(); currentBGMusic.currentTime = 0;
  }
  currentBGMusic = sounds[name];
  if (!muted) currentBGMusic.play().catch(()=>{});
}

function playSFX(name) {
  if (muted) return;
  const sfx = sounds[name];
  sfx.currentTime = 0;
  sfx.play().catch(()=>{});
}

const muteBtn = document.getElementById("muteBtn");
muteBtn.onclick = () => {
  muted = !muted;
  muteBtn.textContent = muted ? "🔇" : "🔊";
  if (muted) {
    Object.values(sounds).forEach(s => s.pause());
  } else {
    if (currentBGMusic) currentBGMusic.play().catch(()=>{});
  }
};

/* =============================================
   CANVAS & DOM
   ============================================= */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const menu = document.getElementById("menu");
const playBtn = document.getElementById("playBtn");
const rankingDiv = document.getElementById("ranking");
const pauseBtn = document.getElementById("pauseBtn");
const comboDisplay = document.getElementById("comboDisplay");
const slowIndicator = document.getElementById("slowIndicator");

/* =============================================
   IMAGENS
   ============================================= */
function img(src) { const i = new Image(); i.src = src; return i; }

const bgNormal  = img("IMG/arvore.png");
const bgSnow    = img("IMG/arvore_neve.png");
const bgSakura  = img("IMG/arvore_sakura.png");
const basketImg = img("IMG/cesto.png");
const bombImg   = img("IMG/bomba.png");

const fruitSprites = [
  img("IMG/maca.png"), img("IMG/laranja.png"), img("IMG/uva.png"),
  img("IMG/banana.png"), img("IMG/cereja.png"), img("IMG/ameixa.png")
];
const frozenSprites = [
  img("IMG/macacongelada.png"), img("IMG/laranjacongelada.png"), img("IMG/uvacongelada.png"),
  img("IMG/bananacongelada.png"), img("IMG/cerejacongelada.png"), img("IMG/ameixacongelada.png")
];

/* =============================================
   ESTADO
   ============================================= */
let playerName = "";
let gameStarted = false;
let paused = false;

let win = false, lose = false;
let lastWin = false, lastLose = false;
let overlayAlpha = 0;

let basket, fruit;
let score = 0, level = 1;
let missed = 0;
const MAX_MISSED = 15;
const TARGET_SCORE = 250;

let speed = 3;
let slowTimer = 0;
let comboCount = 0;
let comboTimer = 0;

let currentBG = bgNormal;
let keys = {};

// Partículas
let particles = [];

// Frutas do menu (decoração)
let menuFruits = [];
for (let i = 0; i < 10; i++) {
  menuFruits.push({
    x: Math.random() * 380,
    y: Math.random() * 650,
    speed: 0.6 + Math.random() * 1.4,
    angle: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    img: fruitSprites[Math.floor(Math.random() * fruitSprites.length)]
  });
}

/* =============================================
   RANKING
   ============================================= */
let ranking = [];
try { ranking = JSON.parse(localStorage.getItem("fruitRanking") || "[]"); } catch(e) {}

function updateRanking() {
  if (ranking.length === 0) {
    rankingDiv.innerHTML = "";
    return;
  }
  let html = "<h3>🏆 Ranking</h3>";
  ranking.forEach((p, i) => {
    const cls = i === 0 ? "top1" : i === 1 ? "top2" : i === 2 ? "top3" : "";
    const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i+1}º`;
    html += `<div class="rank-row ${cls}"><span>${medal} ${p.nome}</span><span>${p.pontos} pts</span></div>`;
  });
  rankingDiv.innerHTML = html;
}

function saveScore() {
  ranking.push({ nome: playerName, pontos: score });
  ranking.sort((a, b) => b.pontos - a.pontos);
  ranking = ranking.slice(0, 5);
  try { localStorage.setItem("fruitRanking", JSON.stringify(ranking)); } catch(e) {}
  updateRanking();
}

/* =============================================
   PARTÍCULAS
   ============================================= */
function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      alpha: 1,
      size: 4 + Math.random() * 6,
      color,
      decay: 0.025 + Math.random() * 0.02
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.alpha > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12; // gravity
    p.alpha -= p.decay;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

/* =============================================
   SPAWN
   ============================================= */
function spawnFruit() {
  let type = "normal", sprite = null;

  if (level >= 2 && level <= 5) {
    if (Math.random() < 0.25) { type = "bomb"; sprite = bombImg; }
  }
  if (level >= 6 && level <= 8) {
    if (!sprite && Math.random() < 0.28) { type = "bomb"; sprite = bombImg; }
    if (!sprite && Math.random() < 0.28) {
      type = "freeze";
      sprite = frozenSprites[Math.floor(Math.random() * frozenSprites.length)];
    }
  }
  if (level >= 9) {
    const r = Math.random();
    if (r < 0.28) { type = "bomb"; sprite = bombImg; }
    else if (r < 0.52) { type = "freeze"; sprite = frozenSprites[Math.floor(Math.random() * frozenSprites.length)]; }
  }

  if (!sprite) sprite = fruitSprites[Math.floor(Math.random() * fruitSprites.length)];

  fruit = {
    x: 20 + Math.random() * (canvas.width - 80),
    y: -70,
    size: 60,
    type,
    img: sprite,
    angle: 0,
    rotSpeed: (Math.random() - 0.5) * 0.05
  };
}

/* =============================================
   RESET / START
   ============================================= */
function resetGame() {
  basket = { x: 135, y: 490, width: 150, height: 200, speed: 6 };
  fruit = null;
  score = 0; level = 1; speed = 3; missed = 0;
  win = false; lose = false; lastWin = false; lastLose = false;
  overlayAlpha = 0; slowTimer = 0;
  comboCount = 0; comboTimer = 0;
  particles = [];
  currentBG = bgNormal;
  spawnFruit();
  playBG("menu");
}

function startGame() {
  playerName = document.getElementById("playerName").value.trim();
  if (!playerName) { alert("Digite seu nome!"); return; }
  menu.style.display = "none";
  pauseBtn.classList.add("visible");
  gameStarted = true;
  paused = false;
  resetGame();
}

function backToMenu() {
  gameStarted = false; paused = false;
  win = false; lose = false; lastWin = false; lastLose = false;
  menu.style.display = "flex";
  pauseBtn.classList.remove("visible");
  slowIndicator.style.display = "none";
  playBG("menu");
}

function togglePause() {
  if (!gameStarted || win || lose) return;
  paused = !paused;
  pauseBtn.textContent = paused ? "▶" : "⏸";
  if (!paused && currentBGMusic) currentBGMusic.play().catch(()=>{});
  else if (paused && currentBGMusic) currentBGMusic.pause();
}

pauseBtn.onclick = togglePause;

/* =============================================
   COLISÃO
   ============================================= */
function collides(a, b) {
  return (
    a.x + 40 < b.x + b.size &&
    a.x + a.width - 40 > b.x &&
    a.y + 60 < b.y + b.size &&
    a.y + a.height > b.y
  );
}

/* =============================================
   LEVEL
   ============================================= */
function updateLevel() {
  const newLevel = Math.floor(score / 12) + 1;
  if (newLevel !== level) {
    if (level === 6 && newLevel === 7) currentBG = bgSnow;
    if (level === 9 && newLevel === 10) currentBG = bgSakura;
    level = newLevel;
    speed = Math.min(3 + level * 0.55, 8.5);
  }
}

/* =============================================
   COMBO
   ============================================= */
function showCombo(count) {
  if (count < 3) return;
  let text = "";
  if (count >= 10) text = `✨ x${count} INCRÍVEL!`;
  else if (count >= 7) text = `🔥 x${count} COMBO!`;
  else if (count >= 5) text = `⚡ x${count} HOT!`;
  else text = `🎯 x${count} COMBO!`;
  comboDisplay.textContent = text;
  comboDisplay.style.opacity = "1";
  comboDisplay.style.fontSize = Math.min(14 + count, 28) + "px";
  clearTimeout(comboDisplay._timeout);
  comboDisplay._timeout = setTimeout(() => { comboDisplay.style.opacity = "0"; }, 1200);
}

/* =============================================
   UPDATE
   ============================================= */
function update() {
  if (!gameStarted) {
    menuFruits.forEach(f => {
      f.y += f.speed;
      f.angle += f.rotSpeed;
      if (f.y > 680) { f.y = -60; f.x = Math.random() * 380; }
    });
    return;
  }

  if (paused) return;

  if (win || lose) {
    overlayAlpha += 0.02;
    if (overlayAlpha > 0.85) overlayAlpha = 0.85;

    if (win && !lastWin) {
      lastWin = true;
      if (currentBGMusic) currentBGMusic.pause();
      playSFX("vitoria");
    }
    if (lose && !lastLose) {
      lastLose = true;
      if (currentBGMusic) currentBGMusic.pause();
      playSFX("derrota");
    }
    updateParticles();
    return;
  }

  // Movimento cesta (teclado)
  if (keys["arrowleft"] || keys["a"]) basket.x -= basket.speed;
  if (keys["arrowright"] || keys["d"]) basket.x += basket.speed;

  basket.x = Math.max(0, Math.min(basket.x, canvas.width - basket.width));

  // Slow
  let fallSpeed = speed;
  if (slowTimer > 0) {
    slowTimer--;
    fallSpeed *= 0.5;
    slowIndicator.style.display = "block";
  } else {
    slowIndicator.style.display = "none";
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Fruta
  if (fruit) {
    fruit.y += fallSpeed;
    fruit.angle += fruit.rotSpeed;

    if (collides(basket, fruit)) {
      const cx = fruit.x + fruit.size / 2;
      const cy = fruit.y + fruit.size / 2;

      if (fruit.type === "bomb") {
        missed += 6;
        comboCount = 0; comboTimer = 0;
        spawnParticles(cx, cy, "#e63946", 12);
        playSFX("bomba");
      } else if (fruit.type === "freeze") {
        slowTimer = 360;
        comboCount++;
        comboTimer = 120;
        spawnParticles(cx, cy, "#4cc9f0", 10);
        showCombo(comboCount);
        playSFX("fruta");
      } else {
        score++;
        comboCount++;
        comboTimer = 120;
        spawnParticles(cx, cy, "#f5c842", 8);
        showCombo(comboCount);
        playSFX("fruta");
        updateLevel();
      }

      fruit = null;
      spawnFruit();
    } else if (fruit.y > canvas.height) {
      if (fruit.type === "normal") missed++;
      comboCount = 0; comboTimer = 0;
      fruit = null;
      spawnFruit();
    }
  }

  updateParticles();

  if (missed >= MAX_MISSED) { lose = true; saveScore(); }
  if (score >= TARGET_SCORE) { win = true; saveScore(); }
}

/* =============================================
   HUD
   ============================================= */
function drawHUD() {
  // Painel de fundo
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  roundRect(ctx, 8, 8, 260, 90, 10);
  ctx.fill();

  ctx.fillStyle = "white";
  ctx.font = "bold 14px Arial";
  ctx.textAlign = "left";
  ctx.fillText(`Pontos: ${score} / ${TARGET_SCORE}`, 18, 28);

  // Level badge
  ctx.fillStyle = "#f5c842";
  ctx.font = "bold 13px Arial";
  ctx.fillText(`Nível ${level}`, 18, 48);

  // Barra de vida (missed)
  const pct = 1 - (missed / MAX_MISSED);
  const barW = 230;

  ctx.fillStyle = "rgba(255,255,255,0.15)";
  roundRect(ctx, 18, 58, barW, 14, 7);
  ctx.fill();

  const barColor = pct > 0.5 ? "#3aa657" : pct > 0.25 ? "#f5c842" : pct > 0.1 ? "#e07020" : "#e63946";
  ctx.fillStyle = barColor;
  roundRect(ctx, 18, 58, barW * pct, 14, 7);
  ctx.fill();

  ctx.strokeStyle = "rgba(255,255,255,0.4)";
  ctx.lineWidth = 1;
  roundRect(ctx, 18, 58, barW, 14, 7);
  ctx.stroke();

  // Ícone slow
  if (slowTimer > 0) {
    ctx.fillStyle = "#4cc9f0";
    ctx.font = "bold 11px Arial";
    ctx.fillText("❄ SLOW", 18, 86);
  }

  // Combo indicator (no HUD)
  if (comboCount >= 3 && comboTimer > 0) {
    ctx.fillStyle = "#f5c842";
    ctx.font = "bold 11px Arial";
    ctx.textAlign = "right";
    ctx.fillText(`x${comboCount}`, 270, 28);
  }
}

/* =============================================
   TELA FINAL
   ============================================= */
function drawEndScreen() {
  ctx.fillStyle = `rgba(0,0,0,${overlayAlpha})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";

  if (win) {
    // Título
    ctx.fillStyle = "#f5c842";
    ctx.font = "bold 30px 'Press Start 2P', cursive";
    ctx.fillText("PARABÉNS!", 210, 190);

    ctx.fillStyle = "white";
    ctx.font = "14px 'Press Start 2P', cursive";
    ctx.fillText("Você venceu!", 210, 225);
    ctx.font = "10px 'Press Start 2P', cursive";
    ctx.fillText(`Score: ${score} pts`, 210, 250);

    // Ranking local
    drawEndRanking(280);
  }

  if (lose) {
    ctx.fillStyle = "#e63946";
    ctx.font = "bold 28px 'Press Start 2P', cursive";
    ctx.fillText("GAME OVER", 210, 200);

    ctx.fillStyle = "white";
    ctx.font = "12px 'Press Start 2P', cursive";
    ctx.fillText("Tente novamente!", 210, 235);
    ctx.font = "10px 'Press Start 2P', cursive";
    ctx.fillText(`Score: ${score} pts`, 210, 258);

    drawEndRanking(290);
  }

  // Botão Reiniciar
  drawBtn(140, 490, 140, 44, "#3aa657", "#1a5c30", "Reiniciar", 11);

  // Botão Menu
  drawBtn(140, 546, 140, 44, "#444", "#222", "Menu", 11);
}

function drawEndRanking(startY) {
  if (ranking.length === 0) return;
  ctx.fillStyle = "rgba(255,255,255,0.1)";
  roundRect(ctx, 60, startY - 20, 300, ranking.length * 22 + 30, 10);
  ctx.fill();

  ctx.fillStyle = "#f5c842";
  ctx.font = "8px 'Press Start 2P', cursive";
  ctx.textAlign = "center";
  ctx.fillText("🏆 TOP RANKING", 210, startY - 4);

  ranking.slice(0, 3).forEach((p, i) => {
    const y = startY + 16 + i * 22;
    const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : "🥉";
    ctx.fillStyle = i === 0 ? "#f5c842" : i === 1 ? "#ccc" : "#cd7f32";
    ctx.font = "8px 'Press Start 2P', cursive";
    ctx.fillText(`${medal} ${p.nome.substring(0,10)} - ${p.pontos}`, 210, y);
  });
}

function drawBtn(x, y, w, h, colorTop, colorShadow, label, fontSize) {
  // shadow
  ctx.fillStyle = colorShadow;
  roundRect(ctx, x, y + 4, w, h, 8);
  ctx.fill();
  // top
  ctx.fillStyle = colorTop;
  roundRect(ctx, x, y, w, h, 8);
  ctx.fill();
  // label
  ctx.fillStyle = "white";
  ctx.font = `${fontSize}px 'Press Start 2P', cursive`;
  ctx.textAlign = "center";
  ctx.fillText(label, x + w / 2, y + h / 2 + fontSize / 3);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* =============================================
   DRAW
   ============================================= */
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(currentBG, 0, 0, canvas.width, canvas.height);

  // Overlay escuro suave
  ctx.fillStyle = "rgba(0,0,0,0.22)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!gameStarted) {
    // Frutas animadas no menu
    menuFruits.forEach(f => {
      ctx.save();
      ctx.translate(f.x + 27, f.y + 27);
      ctx.rotate(f.angle);
      ctx.globalAlpha = 0.55;
      ctx.drawImage(f.img, -27, -27, 54, 54);
      ctx.restore();
    });
    return;
  }

  // Cesta
  ctx.drawImage(basketImg, basket.x, basket.y, basket.width, basket.height);

  // Fruta (com rotação)
  if (fruit) {
    ctx.save();
    ctx.translate(fruit.x + fruit.size / 2, fruit.y + fruit.size / 2);
    ctx.rotate(fruit.angle);
    ctx.drawImage(fruit.img, -fruit.size / 2, -fruit.size / 2, fruit.size, fruit.size);
    ctx.restore();
  }

  // Partículas
  drawParticles();

  // HUD
  drawHUD();

  // Pause overlay
  if (paused && !win && !lose) {
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.font = "bold 22px 'Press Start 2P', cursive";
    ctx.textAlign = "center";
    ctx.fillText("PAUSA", 210, 310);
    ctx.font = "10px 'Press Start 2P', cursive";
    ctx.fillText("Clique ▶ para continuar", 210, 340);
  }

  // Tela final
  if (win || lose) {
    drawParticles();
    drawEndScreen();
  }
}

/* =============================================
   LOOP
   ============================================= */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

/* =============================================
   EVENTOS
   ============================================= */
document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === "Escape") togglePause();
  if (e.key === " ") { e.preventDefault(); togglePause(); }
});
document.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

// Touch controls
const touchLeft = document.getElementById("touchLeft");
const touchRight = document.getElementById("touchRight");

touchLeft.addEventListener("touchstart",  () => keys["arrowleft"] = true,  { passive: true });
touchLeft.addEventListener("touchend",    () => keys["arrowleft"] = false, { passive: true });
touchRight.addEventListener("touchstart", () => keys["arrowright"] = true,  { passive: true });
touchRight.addEventListener("touchend",   () => keys["arrowright"] = false, { passive: true });

// Swipe/drag na canvas para mover a cesta
let touchStartX = null;
canvas.addEventListener("touchstart", e => {
  if (win || lose || !gameStarted) return;
  touchStartX = e.touches[0].clientX;
}, { passive: true });
canvas.addEventListener("touchmove", e => {
  if (!touchStartX || win || lose || !gameStarted) return;
  const dx = e.touches[0].clientX - touchStartX;
  basket.x = Math.max(0, Math.min(basket.x + dx * 0.8, canvas.width - basket.width));
  touchStartX = e.touches[0].clientX;
}, { passive: true });
canvas.addEventListener("touchend", () => { touchStartX = null; }, { passive: true });

// Cliques canvas (botões tela final)
canvas.addEventListener("click", e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  if (win || lose) {
    if (x > 140 && x < 280 && y > 490 && y < 534) resetGame();
    if (x > 140 && x < 280 && y > 546 && y < 590) backToMenu();
  }
});

playBtn.onclick = startGame;

// Input: Enter para jogar
document.getElementById("playerName").addEventListener("keydown", e => {
  if (e.key === "Enter") startGame();
});

// Inicia música menu no primeiro clique do usuário
document.addEventListener("click", () => {
  if (!gameStarted && (!currentBGMusic || currentBGMusic.paused)) playBG("menu");
}, { once: false });

updateRanking();
loop();
</script>
